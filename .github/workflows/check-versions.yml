name: Check for Updates

on:
  # Run every 6 hours
  schedule:
    - cron: '0 */6 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

  # Run on push to test the workflow
  push:
    branches:
      - master
    paths:
      - '.github/workflows/check-versions.yml'

permissions:
  contents: write

jobs:
  check-versions:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure git
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y curl jq

    - name: Check for version updates
      id: check
      run: |
        chmod +x check_versions.sh
        # Run in update mode to auto-commit if changes detected
        if ./check_versions.sh --update; then
          echo "No updates found"
          echo "updated=false" >> $GITHUB_OUTPUT
        else
          echo "Updates found and committed"
          echo "updated=true" >> $GITHUB_OUTPUT
        fi

    - name: Notify about update
      if: steps.check.outputs.updated == 'true'
      run: |
        echo "New version detected; check_versions.sh committed and pushed."
        echo "COPR build will be triggered automatically."
        echo ""
        echo "Current versions:"
        cat versions.json

    - name: Verify CI configuration
      if: always()
      run: |
        LAST=$(git log -1 --format=%ct)
        THRESHOLD=$(( $(date +%s) - 3888000 ))
        if [ "$LAST" -lt "$THRESHOLD" ]; then
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git commit --allow-empty -m "ci: refresh workflow configuration"
          git push
        fi
